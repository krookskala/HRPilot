name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hrpilot_test
          POSTGRES_USER: hrpilot
          POSTGRES_PASSWORD: hrpilot123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hrpilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn verify -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hrpilot_test
          DB_USERNAME: hrpilot
          DB_PASSWORD: hrpilot123
          JWT_SECRET: ci-test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha
          APP_STORAGE_PROVIDER: local
          APP_STORAGE_LOCAL_UPLOAD_DIR: target/test-uploads

      - name: Dependency security check
        run: mvn org.owasp:dependency-check-maven:check -B
        continue-on-error: true

      - name: Build JAR
        run: mvn package -DskipTests -B

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build -- --configuration production

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t hrpilot-backend ./backend

      - name: Build frontend image
        run: docker build -t hrpilot-frontend ./frontend
