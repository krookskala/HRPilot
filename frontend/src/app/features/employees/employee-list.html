<div class="list-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Employees</h1>
            <p class="page-subtitle">Manage your organization's workforce</p>
        </div>
        <button mat-flat-button color="primary" (click)="openDialog()" *ngIf="canManage">
            <mat-icon>add</mat-icon>
            Add Employee
        </button>
    </div>

    <div *ngIf="loading" class="spinner-center">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="error" class="error-banner">
        <mat-icon>error_outline</mat-icon>
        {{ error }}
    </div>

    <div class="table-panel" *ngIf="!loading && !error">
        <table mat-table [dataSource]="employees">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let emp">{{ emp.id }}</td>
            </ng-container>

            <ng-container matColumnDef="firstName">
                <th mat-header-cell *matHeaderCellDef>First Name</th>
                <td mat-cell *matCellDef="let emp">{{ emp.firstName }}</td>
            </ng-container>

            <ng-container matColumnDef="lastName">
                <th mat-header-cell *matHeaderCellDef>Last Name</th>
                <td mat-cell *matCellDef="let emp">{{ emp.lastName }}</td>
            </ng-container>

            <ng-container matColumnDef="position">
                <th mat-header-cell *matHeaderCellDef>Position</th>
                <td mat-cell *matCellDef="let emp">{{ emp.position }}</td>
            </ng-container>

            <ng-container matColumnDef="salary">
                <th mat-header-cell *matHeaderCellDef>Salary</th>
                <td mat-cell *matCellDef="let emp">{{ emp.salary | number:'1.2-2' }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let emp">
                    <button mat-icon-button color="warn" matTooltip="Delete"
                            (click)="delete(emp.id)" *ngIf="canManage">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator
            [length]="totalElements"
            [pageSize]="pageSize"
            [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 20, 50]"
            (page)="onPageChange($event)"
            showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
