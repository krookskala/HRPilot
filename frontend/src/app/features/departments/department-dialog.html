<div class="dialog-header">
    <mat-icon>apartment</mat-icon>
    <h2>{{ isEdit ? ('departments.editDepartment' | translate) : ('departments.addDepartment' | translate) }}</h2>
</div>

<mat-dialog-content>
    <form [formGroup]="form" class="dialog-form">

        <mat-form-field appearance="outline">
            <mat-label>{{ 'departments.deptName' | translate }}</mat-label>
            <input matInput formControlName="name" />
            <mat-error>{{ 'departments.deptNameRequired' | translate }}</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>{{ 'departments.managerId' | translate }}</mat-label>
            <input matInput type="number" formControlName="managerId" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>{{ 'departments.parentDeptId' | translate }}</mat-label>
            <input matInput type="number" formControlName="parentDepartmentId" />
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button mat-flat-button color="primary" (click)="save()">{{ 'common.save' | translate }}</button>
</mat-dialog-actions>
