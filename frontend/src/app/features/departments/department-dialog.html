<h2 mat-dialog-title>Add Department</h2>

<mat-dialog-content class="flex flex-col gap-4 pt-2">
  <form [formGroup]="form" class="flex flex-col gap-4">

    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error>Department name is required (min 2 characters)</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Manager ID (optional)</mat-label>
      <input matInput type="number" formControlName="managerId" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Parent Department ID (optional)</mat-label>
      <input matInput type="number" formControlName="parentDepartmentId" />
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
