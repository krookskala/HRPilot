<div class="p-4">
    <h2 class="text-xl font-bold mb-4">Departments</h2>

    <button mat-raised-button color="primary" class="mb-4"
    (click)="openDialog()">Add Department</button>

    <table mat-table [dataSource]="departments" class="w-full">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let dept">{{ dept.id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let dept">{{ dept.name }}</td>
      </ng-container>

      <ng-container matColumnDef="managerEmail">
        <th mat-header-cell *matHeaderCellDef>Manager</th>
        <td mat-cell *matCellDef="let dept">{{ dept.managerEmail }}</td>
      </ng-container>

      <ng-container matColumnDef="parentDepartmentName">
        <th mat-header-cell *matHeaderCellDef>Parent Department</th>
        <td mat-cell *matCellDef="let dept">{{ dept.parentDepartmentName }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let dept">
          <button mat-button color="warn"
  (click)="delete(dept.id)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </div>
