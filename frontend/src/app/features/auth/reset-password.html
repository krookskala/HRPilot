<div class="auth-page">
    <mat-card class="auth-card">
        <h1>Create New Password</h1>
        <p *ngIf="email">{{ email }}</p>

        <div *ngIf="loading" class="auth-message">Validating reset token...</div>
        <div *ngIf="error" class="auth-error">{{ error }}</div>

        <form *ngIf="!loading && !error" [formGroup]="form" class="auth-form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline">
                <mat-label>New Password</mat-label>
                <input matInput type="password" formControlName="password" />
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Confirm Password</mat-label>
                <input matInput type="password" formControlName="confirmPassword" />
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit">Update Password</button>
        </form>
    </mat-card>
</div>
