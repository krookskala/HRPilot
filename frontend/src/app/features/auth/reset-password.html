<div class="auth-page">
    <mat-card class="auth-card">
        <h1>{{ 'auth.createNewPassword' | translate }}</h1>
        @if (email) {
        <p>{{ email }}</p>
        }

        @if (loading) {
        <div class="auth-message">{{ 'auth.validatingToken' | translate }}</div>
        }
        @if (error) {
        <div class="auth-error">{{ error }}</div>
        }

        @if (!loading && !error) {
        <form [formGroup]="form" class="auth-form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline">
                <mat-label>{{ 'auth.newPassword' | translate }}</mat-label>
                <input matInput type="password" formControlName="password" />
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>{{ 'common.confirmPassword' | translate }}</mat-label>
                <input matInput type="password" formControlName="confirmPassword" />
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit">{{ 'auth.updatePassword' | translate }}</button>
        </form>
        }
    </mat-card>
</div>
