<div class="auth-page">
    <mat-card class="auth-card">
        <h1>{{ 'auth.resetPassword' | translate }}</h1>
        <p>{{ 'auth.resetPasswordDesc' | translate }}</p>

        @if (message) {
        <div class="auth-success">{{ message }}</div>
        }
        @if (error) {
        <div class="auth-error">{{ error }}</div>
        }

        <form [formGroup]="form" class="auth-form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline">
                <mat-label>{{ 'common.email' | translate }}</mat-label>
                <input matInput type="email" formControlName="email" />
                <mat-error>{{ 'login.emailRequired' | translate }}</mat-error>
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit">{{ 'auth.generateLink' | translate }}</button>
        </form>

        <a routerLink="/login" class="back-link">{{ 'auth.backToLogin' | translate }}</a>
    </mat-card>
</div>
