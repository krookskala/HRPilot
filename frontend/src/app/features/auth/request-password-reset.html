<div class="auth-page">
    <mat-card class="auth-card">
        <h1>Reset Password</h1>
        <p>Enter your email to create a secure reset link.</p>

        <div *ngIf="message" class="auth-success">{{ message }}</div>
        <div *ngIf="error" class="auth-error">{{ error }}</div>

        <form [formGroup]="form" class="auth-form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline">
                <mat-label>Email</mat-label>
                <input matInput type="email" formControlName="email" />
                <mat-error>Valid email is required</mat-error>
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit">Generate Link</button>
        </form>

        <!-- Reset link is sent via email in production -->

        <a routerLink="/login" class="back-link">Back to login</a>
    </mat-card>
</div>
