<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <mat-card class="w-full max-w-sm p-4">

      <mat-card-header>
        <mat-card-title>HRPilot Login</mat-card-title>
      </mat-card-header>

      <mat-card-content class="mt-4 flex flex-col gap-4">

        <div *ngIf="error" class="text-red-500 text-sm">{{ error }}</div>

        <form [formGroup]="form" class="flex flex-col gap-4">
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" />
            <mat-error>Valid email is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" />
            <mat-error>Password must be at least 6 characters</mat-error>
          </mat-form-field>
        </form>

      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button color="primary" class="w-full"
  (click)="login()" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" class="inline-block"></mat-spinner>
          <span *ngIf="!loading">Login</span>
        </button>
      </mat-card-actions>

    </mat-card>
  </div>
