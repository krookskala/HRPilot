<div class="dialog-header">
    <mat-icon>pending_actions</mat-icon>
    <h2>{{ data.title }}</h2>
</div>

<mat-dialog-content>
    <form [formGroup]="form" class="dialog-form">
        <mat-form-field appearance="outline">
            <mat-label>{{ data.reasonLabel }}</mat-label>
            <textarea matInput rows="4" formControlName="reason"></textarea>
            <mat-error>A reason is required</mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()">{{ data.actionLabel }}</button>
</mat-dialog-actions>
