<div class="p-4">
    <h2 class="text-xl font-bold mb-4">Leave Requests</h2>

    <button mat-raised-button color="primary" class="mb-4"
    (click)="openDialog()">Add Leave Request</button>

    <div *ngIf="loading" class="flex justify-center p-8">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="error" class="text-red-500 p-4">{{ error }}</div>

    <table mat-table [dataSource]="leaves" class="w-full" *ngIf="!loading && !error">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let leave">{{ leave.id }}</td>
      </ng-container>

      <ng-container matColumnDef="employeeFullName">
        <th mat-header-cell *matHeaderCellDef>Full Name</th>
        <td mat-cell *matCellDef="let leave">{{ leave.employeeFullName }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let leave">{{ leave.type }}</td>
      </ng-container>

      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef>Start Date</th>
        <td mat-cell *matCellDef="let leave">{{ leave.startDate }}</td>
      </ng-container>

      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef>End Date</th>
        <td mat-cell *matCellDef="let leave">{{ leave.endDate }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let leave">{{ leave.status }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let leave">
          <button mat-button color="primary"
  (click)="approve(leave.id)" *ngIf="canApprove">Approve</button>
          <button mat-button color="warn"
  (click)="reject(leave.id)" *ngIf="canApprove">Reject</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <mat-paginator *ngIf="!loading && !error"
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[5, 10, 20, 50]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
