<div class="list-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Leave Requests</h1>
            <p class="page-subtitle">Track and manage employee leave requests</p>
        </div>
        <button mat-flat-button color="primary" (click)="openDialog()">
            <mat-icon>add</mat-icon>
            New Request
        </button>
    </div>

    <div *ngIf="loading" class="spinner-center">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="error" class="error-banner">
        <mat-icon>error_outline</mat-icon>
        {{ error }}
    </div>

    <div class="table-panel" *ngIf="!loading && !error">
        <table mat-table [dataSource]="leaves">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let leave">{{ leave.id }}</td>
            </ng-container>

            <ng-container matColumnDef="employeeFullName">
                <th mat-header-cell *matHeaderCellDef>Employee</th>
                <td mat-cell *matCellDef="let leave">{{ leave.employeeFullName }}</td>
            </ng-container>

            <ng-container matColumnDef="type">
                <th mat-header-cell *matHeaderCellDef>Type</th>
                <td mat-cell *matCellDef="let leave">{{ leave.type }}</td>
            </ng-container>

            <ng-container matColumnDef="startDate">
                <th mat-header-cell *matHeaderCellDef>Start Date</th>
                <td mat-cell *matCellDef="let leave">{{ leave.startDate }}</td>
            </ng-container>

            <ng-container matColumnDef="endDate">
                <th mat-header-cell *matHeaderCellDef>End Date</th>
                <td mat-cell *matCellDef="let leave">{{ leave.endDate }}</td>
            </ng-container>

            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>Status</th>
                <td mat-cell *matCellDef="let leave">
                    <span class="status-badge"
                          [class.status-pending]="leave.status === 'PENDING'"
                          [class.status-approved]="leave.status === 'APPROVED'"
                          [class.status-rejected]="leave.status === 'REJECTED'">
                        {{ leave.status }}
                    </span>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let leave">
                    <button mat-icon-button color="primary" matTooltip="Approve"
                            (click)="approve(leave.id)" *ngIf="canApprove && leave.status === 'PENDING'">
                        <mat-icon>check_circle</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" matTooltip="Reject"
                            (click)="reject(leave.id)" *ngIf="canApprove && leave.status === 'PENDING'">
                        <mat-icon>cancel</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator
            [length]="totalElements"
            [pageSize]="pageSize"
            [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 20, 50]"
            (page)="onPageChange($event)"
            showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
