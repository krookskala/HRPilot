<div class="chart-container">
    <div class="chart-grid">
        <div class="chart-card">
            <h3 class="chart-title">{{ 'payrolls.netSalaryTrend' | translate }}</h3>
            <div class="chart-wrapper">
                <canvas baseChart
                    [data]="lineChartData"
                    [options]="lineChartOptions"
                    type="line">
                </canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3 class="chart-title">{{ 'payrolls.salaryBreakdown' | translate }}</h3>
            <div class="chart-wrapper">
                <canvas baseChart
                    [data]="barChartData"
                    [options]="barChartOptions"
                    type="bar">
                </canvas>
            </div>
        </div>
    </div>
</div>
