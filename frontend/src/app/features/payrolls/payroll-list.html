<div class="p-4">
    <h2 class="text-xl font-bold mb-4">Payrolls</h2>

    <button mat-raised-button color="primary" class="mb-4"
    (click)="openDialog()" *ngIf="canManage">Add Payroll</button>

    <div *ngIf="loading" class="flex justify-center p-8">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="error" class="text-red-500 p-4">{{ error }}</div>

    <table mat-table [dataSource]="payrolls" class="w-full" *ngIf="!loading && !error">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.id }}</td>
      </ng-container>

      <ng-container matColumnDef="employeeFullName">
        <th mat-header-cell *matHeaderCellDef>Full Name</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.employeeFullName }}</td>
      </ng-container>

      <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef>Year</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.year }}</td>
      </ng-container>

      <ng-container matColumnDef="month">
        <th mat-header-cell *matHeaderCellDef>Month</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.month }}</td>
      </ng-container>

      <ng-container matColumnDef="baseSalary">
        <th mat-header-cell *matHeaderCellDef>Base Salary</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.baseSalary }}</td>
      </ng-container>

      <ng-container matColumnDef="bonus">
        <th mat-header-cell *matHeaderCellDef>Bonus</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.bonus }}</td>
      </ng-container>

      <ng-container matColumnDef="deductions">
        <th mat-header-cell *matHeaderCellDef>Deductions</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.deductions }}</td>
      </ng-container>

      <ng-container matColumnDef="netSalary">
        <th mat-header-cell *matHeaderCellDef>Net Salary</th>
        <td mat-cell *matCellDef="let payroll">{{ payroll.netSalary }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let payroll">
          <button mat-button color="primary"
            (click)="markAsPaid(payroll.id)" *ngIf="canManage">Mark as Paid</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <mat-paginator *ngIf="!loading && !error"
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[5, 10, 20, 50]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
