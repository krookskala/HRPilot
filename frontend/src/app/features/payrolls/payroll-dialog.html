<div class="dialog-header">
    <mat-icon>payments</mat-icon>
    <h2>Create Payroll Run</h2>
</div>

<mat-dialog-content>
    <form [formGroup]="form" class="dialog-form">

        <mat-form-field appearance="outline">
            <mat-label>Run Name</mat-label>
            <input matInput formControlName="name" />
            <mat-error>Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Employee ID</mat-label>
            <input matInput type="number" formControlName="employeeId" />
            <mat-error>Employee ID is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Year</mat-label>
            <input matInput type="number" formControlName="year" />
            <mat-error>Year is required (min 2020)</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Month</mat-label>
            <input matInput type="number" formControlName="month" />
            <mat-error>Month must be between 1 and 12</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Tax Class</mat-label>
            <mat-select formControlName="taxClass">
                <mat-option value="I">I</mat-option>
                <mat-option value="II">II</mat-option>
                <mat-option value="III">III</mat-option>
                <mat-option value="IV">IV</mat-option>
                <mat-option value="V">V</mat-option>
                <mat-option value="VI">VI</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Bonus</mat-label>
            <input matInput type="number" formControlName="bonus" />
            <mat-error>Bonus is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Additional Deduction</mat-label>
            <input matInput type="number" formControlName="additionalDeduction" />
            <mat-error>Additional deduction is required</mat-error>
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
