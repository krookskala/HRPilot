<div class="dialog-header">
    <mat-icon>payments</mat-icon>
    <h2>Add Payroll</h2>
</div>

<mat-dialog-content>
    <form [formGroup]="form" class="dialog-form">

        <mat-form-field appearance="outline">
            <mat-label>Employee ID</mat-label>
            <input matInput type="number" formControlName="employeeId" />
            <mat-error>Employee ID is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Year</mat-label>
            <input matInput type="number" formControlName="year" />
            <mat-error>Year is required (min 2020)</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Month</mat-label>
            <input matInput type="number" formControlName="month" />
            <mat-error>Month must be between 1 and 12</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Base Salary</mat-label>
            <input matInput type="number" formControlName="baseSalary" />
            <mat-error>Base salary is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Bonus</mat-label>
            <input matInput type="number" formControlName="bonus" />
            <mat-error>Bonus is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Deductions</mat-label>
            <input matInput type="number" formControlName="deductions" />
            <mat-error>Deductions is required</mat-error>
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
