spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrpilot}
    username: ${DB_USERNAME:hrpilot}
    password: ${DB_PASSWORD:hrpilot123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 16

jwt:
  secret: ${JWT_SECRET:change-me-in-production-this-is-a-dev-only-placeholder-key-256bit}

logging:
  level:
    com.hrpilot.backend: DEBUG
