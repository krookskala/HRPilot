server:
  port: 8080

spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  expiration: 3600000
  refresh-expiration: 604800000

app:
  jwtSecret: ${JWT_SECRET}
  frontend-base-url: http://localhost:4200
  invitation:
    expiration-ms: 259200000
  password-reset:
    expiration-ms: 3600000
  storage:
    provider: ${APP_STORAGE_PROVIDER:local} # local, s3
    local:
      upload-dir: ${APP_STORAGE_LOCAL_UPLOAD_DIR:/app/uploads}
    s3:
      bucket:
      region:
      endpoint:
      access-key:
      secret-key:

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
