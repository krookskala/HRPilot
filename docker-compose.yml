services:
  postgres:
    image: postgres:16
    container_name: hrpilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrpilot}
      POSTGRES_USER: ${POSTGRES_USER:-hrpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrpilot123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrpilot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: hrpilot-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hrpilot}
      DB_USERNAME: ${POSTGRES_USER:-hrpilot}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hrpilot123}
      JWT_SECRET: ${JWT_SECRET:-hrpilot-dev-secret-key-that-is-at-least-256-bits-long-for-security}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hrpilot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
