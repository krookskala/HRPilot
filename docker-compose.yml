services:
  postgres:
    image: postgres:16
    container_name: hrpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrpilot}
      POSTGRES_USER: ${POSTGRES_USER:-hrpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrpilot123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrpilot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - hrpilot_backend_net

  backend:
    build: ./backend
    container_name: hrpilot-backend
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hrpilot}
      DB_USERNAME: ${POSTGRES_USER:-hrpilot}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hrpilot123}
      JWT_SECRET: ${JWT_SECRET}
      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-local}
      APP_STORAGE_LOCAL_UPLOAD_DIR: /app/uploads
      APP_STORAGE_S3_BUCKET: ${APP_STORAGE_S3_BUCKET:-}
      APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-}
      APP_STORAGE_S3_ENDPOINT: ${APP_STORAGE_S3_ENDPOINT:-}
      APP_STORAGE_S3_ACCESS_KEY: ${APP_STORAGE_S3_ACCESS_KEY:-}
      APP_STORAGE_S3_SECRET_KEY: ${APP_STORAGE_S3_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-storage:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
    networks:
      - hrpilot_backend_net
      - hrpilot_frontend_net

  frontend:
    build: ./frontend
    container_name: hrpilot-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - hrpilot_frontend_net

volumes:
  postgres-data:
  backend-storage:

networks:
  hrpilot_backend_net:
    internal: true
  hrpilot_frontend_net:
